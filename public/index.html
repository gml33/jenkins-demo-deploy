<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Jenkins Demo Deploy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    main {
      max-width: 720px;
      padding: 48px;
      border: 1px solid #374151;
      border-radius: 24px;
      background: #1f2937;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #d1d5db;
    }

    code {
      background: #030712;
      padding: 4px 8px;
      border-radius: 6px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <main>
    <h1>Deploy Jenkins funcionando</h1>
    <p>
      Esta aplicación fue construida desde GitHub y desplegada automáticamente
      en Docker Swarm mediante Jenkins.
    </p>
    <p>
      Dominio esperado: <code>https://demo.ensigna.tech</code>
    </p>
  </main>
</body>
</html>

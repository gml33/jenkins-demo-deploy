version: "3.8"

services:
  web:
    image: ${IMAGE_NAME}
    networks:
      - traefik_public
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.demo2.rule=Host(`cachilo.ensigna.tech`)"
        - "traefik.http.routers.demo2.entrypoints=websecure"
        - "traefik.http.routers.demo2.tls=true"
        - "traefik.http.routers.demo2.tls.certresolver=le"
        - "traefik.http.routers.demo2.service=demo2"
        - "traefik.http.services.demo2.loadbalancer.server.port=80"

networks:
  traefik_public:
    external: true
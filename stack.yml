version: "3.8"

services:
  web:
    image: demo-app:latest
    networks:
      - traefik_public
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"

        - "traefik.http.routers.demo.rule=Host(`demo.ensigna.tech`)"
        - "traefik.http.routers.demo.entrypoints=websecure"
        - "traefik.http.routers.demo.tls=true"
        - "traefik.http.routers.demo.tls.certresolver=le"

        - "traefik.http.services.demo.loadbalancer.server.port=80"

networks:
  traefik_public:
    external: true